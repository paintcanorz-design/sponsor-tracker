# Build Windows portable (onedir) and attach ZIP to the GitHub Release for the pushed tag.
# Tag format: v1.16 (must match APP_VERSION in src/version.py for in-app updates).
name: Release Windows build

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  windows-portable:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-build.txt

      - name: Build exe (PyInstaller)
        run: pyinstaller sponsor_tracker.spec

      - name: Create portable ZIP
        env:
          PYTHONUTF8: "1"
        run: python pack_release_zip.py

      - name: Verify release ZIP
        run: |
          python -c "import sys,zipfile; from pathlib import Path; ver='${{ github.ref_name }}'.lstrip('v'); zpath=Path('release')/f'SponsorTracker-Windows-v{ver}.zip';
          assert zpath.is_file(), zpath; z=zipfile.ZipFile(zpath); names=z.namelist(); z.close();
          need=['贊助額追蹤.exe','開啟exe前請開啟此檔案安裝所需環境.bat','使用說明.txt','_internal/'];
          missing=[x for x in need if not any(x in n for n in names)];
          assert not missing, f'missing: {missing}'; print(zpath, zpath.stat().st_size)"

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: release/SponsorTracker-Windows-v*.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
