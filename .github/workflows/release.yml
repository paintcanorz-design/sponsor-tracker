# Build Windows portable (onedir) and attach ZIP to the GitHub Release for the pushed tag.
# Tag format: v1.1.1 (must match or follow APP_VERSION in src/version.py for in-app updates).
name: Release Windows build

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  windows-portable:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-build.txt

      - name: Build exe (PyInstaller)
        run: pyinstaller sponsor_tracker.spec

      - name: Create portable ZIP
        shell: pwsh
        run: |
          $ref = "${{ github.ref_name }}"
          $ver = $ref.TrimStart('v')
          $dist = Join-Path "dist" "čīåĐéĄčŋ―čđĪ"
          $exe = Join-Path $dist "čīåĐéĄčŋ―čđĪ.exe"
          if (-not (Test-Path -LiteralPath $exe)) {
            throw "Build output missing: $exe"
          }
          $zip = "SponsorTracker-Windows-v$ver.zip"
          if (Test-Path $zip) { Remove-Item $zip -Force }
          Compress-Archive -LiteralPath $dist -DestinationPath $zip
          Get-Item $zip | Format-List Name, Length

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: SponsorTracker-Windows-v*.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
